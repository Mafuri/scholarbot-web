<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ScholarBot — AI Scholarship Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
:root{--bg:#f9f9f7;--bg2:#fff;--bg3:#f5f5f0;--border:#e8e8e0;--border2:#d0d0c8;--text:#1a1a1a;--text2:#555;--text3:#888;--navy:#1a1a2e;--navy2:#2d2b55;--green:#059669;--green2:#d1fae5;--yellow:#d97706;--yellow2:#fef3c7;--red:#dc2626;--red2:#fee2e2;--blue:#2563eb;--blue2:#dbeafe;--purple:#7c3aed;--purple2:#ede9fe;--r:10px;--r-sm:6px;--r-lg:14px;--shadow:0 1px 4px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--r);border:none;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy2)}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--text)}.btn-outline:hover{background:var(--bg3)}
.btn-green{background:var(--green);color:#fff}.btn-sm{padding:6px 12px;font-size:13px}.btn-xs{padding:4px 10px;font-size:12px}.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;box-shadow:var(--shadow)}
.card-flat{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.tag-blue{background:var(--blue2);color:#1d4ed8}.tag-green{background:var(--green2);color:#15803d}
.tag-yellow{background:var(--yellow2);color:#92400e}.tag-red{background:var(--red2);color:#991b1b}
.tag-purple{background:var(--purple2);color:#5b21b6}.tag-gray{background:var(--bg3);color:var(--text2)}
.form-group{margin-bottom:1rem}
label{font-size:13px;font-weight:500;color:var(--text2);display:block;margin-bottom:5px}
input,select,textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;background:#fff;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.error{color:var(--red);font-size:13px;margin-top:4px}.helper{color:var(--text3);font-size:12px;margin-top:4px}
.nav{background:var(--navy);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.nav-brand{font-size:18px;font-weight:700;cursor:pointer}.nav-desktop{display:flex;gap:2px;align-items:center}
.nav-link{padding:6px 13px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:rgba(255,255,255,.75);transition:all .15s;font-weight:500}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.15);color:#fff}
.page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}.page-narrow{max-width:680px;margin:0 auto;padding:1.5rem 1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.readiness-ring{position:relative;width:100px;height:100px}.readiness-ring svg{transform:rotate(-90deg)}
.readiness-value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:22px;line-height:1}
.readiness-label{font-size:11px;color:var(--text3);margin-top:2px}
.progress{background:var(--bg3);border-radius:10px;height:8px;overflow:hidden}.progress-sm{height:5px}
.progress-fill{height:100%;border-radius:10px;transition:width .6s ease}
.kanban{display:flex;gap:.75rem;overflow-x:auto;padding-bottom:.75rem;-webkit-overflow-scrolling:touch}
.kanban-col{flex:0 0 210px;background:var(--bg3);border-radius:var(--r-lg);padding:.75rem;min-height:180px}
.kanban-col-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center}
.kanban-card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);padding:.75rem;margin-bottom:.5rem;box-shadow:var(--shadow);font-size:13px}
.kanban-card-name{font-weight:500;margin-bottom:3px;line-height:1.3;font-size:12px}
.kanban-card-amount{color:var(--navy);font-weight:700;font-size:14px}.kanban-card-deadline{color:var(--text3);font-size:11px;margin-top:2px}
.sch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.875rem}
.sch-card{border:.5px solid var(--border);border-radius:var(--r-lg);background:var(--bg2);padding:1rem;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.sch-card:hover{border-color:#6366f1;box-shadow:0 4px 16px rgba(99,102,241,.15);transform:translateY(-1px)}.sch-card.selected{border-color:#6366f1;background:#fafafe}
.sch-amount{font-size:22px;font-weight:700;color:var(--navy);margin:4px 0}.sch-provider{font-size:12px;color:var(--text3)}.sch-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:.5rem}
.hero{text-align:center;padding:4rem 1rem 3rem;max-width:780px;margin:0 auto}
.hero h1{font-size:clamp(28px,5vw,46px);font-weight:800;line-height:1.15;margin-bottom:1rem;letter-spacing:-.5px}
.hero p{font-size:clamp(15px,2vw,18px);color:var(--text2);margin-bottom:2rem;max-width:560px;margin-left:auto;margin-right:auto}
.stat-row{display:flex;justify-content:center;gap:2.5rem;padding:1.75rem;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-wrap:wrap}
.q-card{background:var(--bg3);border-radius:var(--r-lg);padding:1.25rem;border-left:4px solid var(--navy)}
.score-card{border-radius:var(--r-lg);padding:1.25rem;border:1.5px solid}
.rubric-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border)}
.rubric-row:last-child{border-bottom:none}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}.empty-icon{font-size:40px;margin-bottom:.75rem}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.spinner-dark{border-color:rgba(0,0,0,.12);border-top-color:var(--navy)}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-size:20px;font-weight:700;margin-bottom:.5rem}.section-sub{color:var(--text2);font-size:14px;margin-bottom:1.5rem}
.tab-bar{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:1.25rem;overflow-x:auto}.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:all .15s}.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.toast-wrap{position:fixed;bottom:1rem;right:1rem;left:1rem;display:flex;flex-direction:column;gap:.5rem;z-index:999;pointer-events:none;align-items:flex-end}
.toast{background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:toastIn .25s ease;max-width:360px;pointer-events:auto}
.toast.success{background:#15803d}.toast.error{background:var(--red)}
@keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.alert{border-radius:var(--r);padding:.875rem 1rem;font-size:14px;margin-bottom:1rem}
.alert-info{background:var(--blue2);color:#1e3a8a;border:1px solid #93c5fd}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:.5rem;z-index:200}
.mobile-nav-items{display:flex;justify-content:space-around}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 10px;border-radius:var(--r-sm);min-width:52px;color:var(--text3);font-size:10px;font-weight:500;transition:color .15s}
.mobile-nav-item.active{color:var(--navy)}.mobile-nav-item .icon{font-size:20px}
.mb-safe{padding-bottom:0}
@media(max-width:640px){
  .nav-desktop{display:none}.mobile-nav{display:flex}.mb-safe{padding-bottom:72px}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}.sch-grid{grid-template-columns:1fr}
  .kanban-col{flex:0 0 190px}.hero{padding:2.5rem 1rem 2rem}.stat-row{gap:1.5rem;padding:1.25rem}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;
const BASE=window.location.origin;
let _tok=localStorage.getItem('sb_tok')||'';
async function api(m,p,b,isForm=false){
  const h={'Authorization':`Bearer ${_tok}`};
  if(!isForm)h['Content-Type']='application/json';
  const r=await fetch(`${BASE}/api${p}`,{method:m,headers:h,body:b?(isForm?b:JSON.stringify(b)):undefined});
  if(r.status===401){_tok='';localStorage.removeItem('sb_tok');window.location.reload();}
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.detail||'Request failed');
  return d;
}
let _addToast=()=>{};
function useToasts(){
  const[toasts,setToasts]=useState([]);
  _addToast=(msg,type='info')=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);};
  return toasts;
}
const toast=(m,t)=>_addToast(m,t);
function useAuth(){
  const[user,setUser]=useState(null);const[loading,setLoading]=useState(true);
  useEffect(()=>{if(_tok)api('GET','/auth/me').then(u=>{setUser(u);setLoading(false)}).catch(()=>{_tok='';localStorage.removeItem('sb_tok');setLoading(false)});else setLoading(false);},[]);
  const login=async(e,pw)=>{const r=await api('POST','/auth/login',{email:e,password:pw});_tok=r.token;localStorage.setItem('sb_tok',r.token);setUser(r.user);};
  const register=async(d)=>{const r=await api('POST','/auth/register',d);_tok=r.token;localStorage.setItem('sb_tok',r.token);setUser(r.user);};
  const logout=()=>{_tok='';localStorage.removeItem('sb_tok');setUser(null);};
  return{user,loading,login,register,logout,setUser};
}
function ReadinessRing({score,size=100}){
  const r=38,circ=2*Math.PI*r,fill=circ-(score/100)*circ;
  const color=score>=80?'#059669':score>=60?'#2563eb':score>=40?'#d97706':'#dc2626';
  return(
    <div className="readiness-ring" style={{width:size,height:size}}>
      <svg width={size} height={size} viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={r} fill="none" stroke="#e5e7eb" strokeWidth="9"/>
        <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="9"
          strokeDasharray={circ} strokeDashoffset={fill} strokeLinecap="round"
          style={{transition:'stroke-dashoffset .8s ease'}}/>
      </svg>
      <div className="readiness-value" style={{color}}>
        <span>{score}</span><span className="readiness-label">/ 100</span>
      </div>
    </div>
  );
}
function Nav({user,page,go,logout}){
  const links=[{id:'dashboard',label:'Dashboard',icon:'📊'},{id:'scholarships',label:'Scholarships',icon:'🎓'},
    {id:'pipeline',label:'Pipeline',icon:'📋'},{id:'packages',label:'Packages',icon:'📦'},
    {id:'interview',label:'Interview',icon:'🎤'},{id:'profile',label:'Profile',icon:'👤'}];
  return(<>
    <nav className="nav">
      <div className="nav-brand" onClick={()=>go('home')}>🎓 ScholarBot</div>
      <div className="nav-desktop">
        {user?(<>{links.map(l=><div key={l.id} className={`nav-link ${page===l.id?'active':''}`} onClick={()=>go(l.id)}>{l.label}</div>)}
          <div className="nav-link" style={{color:'rgba(255,255,255,.5)'}} onClick={logout}>Sign out</div>
        </>):(<>
          <div className="nav-link" onClick={()=>go('login')}>Log in</div>
          <button className="btn btn-primary btn-sm" style={{marginLeft:8}} onClick={()=>go('register')}>Get started free</button>
        </>)}
      </div>
    </nav>
    {user&&<div className="mobile-nav"><div className="mobile-nav-items">
      {links.slice(0,5).map(l=><div key={l.id} className={`mobile-nav-item ${page===l.id?'active':''}`} onClick={()=>go(l.id)}>
        <span className="icon">{l.icon}</span><span>{l.label}</span></div>)}
    </div></div>}
  </>);
}
function HomePage({go}){
  return(<div>
    <div className="hero">
      <h1>Win scholarships with AI</h1>
      <p>Find, match, and apply to scholarships worldwide — Undergraduate, Graduate, and Postgraduate. ScholarBot builds your complete application. You click Submit.</p>
      <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="btn btn-primary" style={{fontSize:15,padding:'11px 24px'}} onClick={()=>go('register')}>Start free →</button>
        <button className="btn btn-outline" style={{fontSize:15,padding:'11px 24px'}} onClick={()=>go('scholarships')}>Browse scholarships</button>
      </div>
    </div>
    <div className="stat-row">
      {[['57+','Verified scholarships'],['$2.2M+','Total funding'],['3','Degree levels'],['50+','Countries']].map(([v,l])=>(
        <div key={l} style={{textAlign:'center'}}><div style={{fontSize:26,fontWeight:800,color:'var(--navy)'}}>{v}</div><div style={{fontSize:12,color:'var(--text3)',marginTop:1}}>{l}</div></div>
      ))}
    </div>
    <div style={{padding:'2.5rem 1rem',maxWidth:860,margin:'0 auto'}}>
      <h2 className="section-title" style={{textAlign:'center',marginBottom:'2rem'}}>How it works</h2>
      <div className="grid3">
        {[['1','Create your profile','Upload your CV. ScholarBot extracts your GPA, major, and skills automatically.'],
          ['2','Get matched','AI ranks scholarships for your specific degree level, country, and field.'],
          ['3','Prepare and submit','Essays written, briefing docs ready. Open the form, paste, click Submit.']].map(([n,t,d])=>(
          <div key={n} className="card" style={{textAlign:'center'}}>
            <div style={{width:40,height:40,borderRadius:'50%',background:'var(--navy)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 1rem',fontWeight:700,fontSize:18}}>{n}</div>
            <h3 style={{fontSize:15,marginBottom:8}}>{t}</h3>
            <p style={{fontSize:13,color:'var(--text2)'}}>{d}</p>
          </div>
        ))}
      </div>
    </div>
    <div style={{background:'var(--bg2)',borderTop:'1px solid var(--border)',padding:'2rem 1rem'}}>
      <h2 className="section-title" style={{textAlign:'center',marginBottom:'2rem'}}>Pricing</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(210px,1fr))',gap:'1rem',maxWidth:760,margin:'0 auto'}}>
        {[{n:'Free',p:0,f:['3 packages/month','Scholarship matching','Essay generation','Email alerts']},
          {n:'Pro',p:9,f:['Unlimited packages','Interview coach','Pipeline tracker','Portfolio builder','Priority support'],feat:true,badge:'Popular'},
          {n:'Agency',p:99,f:['50 students','Admin dashboard','Bulk processing','White-label','API access']}].map(pl=>(
          <div key={pl.n} className="card" style={{textAlign:'center',position:'relative',border:pl.feat?'2px solid var(--navy)':undefined}}>
            {pl.badge&&<div style={{position:'absolute',top:-12,left:'50%',transform:'translateX(-50%)',background:'var(--navy)',color:'#fff',padding:'3px 14px',borderRadius:20,fontSize:11}}>{pl.badge}</div>}
            <h3 style={{fontSize:17,fontWeight:700}}>{pl.n}</h3>
            <div style={{fontSize:32,fontWeight:800,color:'var(--navy)',margin:'1rem 0'}}>${pl.p}<span style={{fontSize:14,color:'var(--text3)',fontWeight:400}}>/mo</span></div>
            <ul style={{textAlign:'left',listStyle:'none',marginBottom:'1rem'}}>
              {pl.f.map(f=><li key={f} style={{fontSize:13,color:'var(--text2)',padding:'4px 0',display:'flex',gap:8}}><span style={{color:'var(--green)',fontWeight:700}}>✓</span>{f}</li>)}
            </ul>
            <button className={`btn ${pl.feat?'btn-primary':'btn-outline'}`} style={{width:'100%'}} onClick={()=>go('register')}>{pl.p===0?'Start free':'Get started'}</button>
          </div>
        ))}
      </div>
    </div>
    <footer style={{background:'var(--navy)',color:'rgba(255,255,255,.5)',textAlign:'center',padding:'2rem 1rem',fontSize:13}}>
      ScholarBot © {new Date().getFullYear()} · AI-powered scholarship applications · Built for students worldwide
    </footer>
  </div>);
}
function AuthPage({mode,login,register,go}){
  const[f,setF]=useState({name:'',email:'',password:'',degree_level:'Graduate',major:'',school:'',nationality:'Kenya',gpa:'',financial_need:false});
  const[loading,setLoading]=useState(false);const[err,setErr]=useState('');
  const isLogin=mode==='login';
  const submit=async(e)=>{e.preventDefault();setLoading(true);setErr('');
    try{if(isLogin){await login(f.email,f.password);go('dashboard');toast('Welcome back!','success');}
    else{await register({...f,gpa:parseFloat(f.gpa)||0});go('dashboard');toast('Account created!','success');}
    }catch(e){setErr(e.message);}finally{setLoading(false);}};
  return(<div className="page-narrow"><div className="card" style={{marginTop:'2rem'}}>
    <h2 style={{marginBottom:'1.5rem',fontSize:22}}>{isLogin?'Sign in':'Create account'}</h2>
    <form onSubmit={submit}>
      {!isLogin&&<div className="form-group"><label>Full name</label><input value={f.name} onChange={e=>setF({...f,name:e.target.value})} required/></div>}
      <div className="form-group"><label>Email</label><input type="email" value={f.email} onChange={e=>setF({...f,email:e.target.value})} required/></div>
      <div className="form-group"><label>Password</label><input type="password" value={f.password} onChange={e=>setF({...f,password:e.target.value})} required/></div>
      {!isLogin&&(<><div className="grid2">
        <div className="form-group"><label>Degree level</label><select value={f.degree_level} onChange={e=>setF({...f,degree_level:e.target.value})}><option>Undergraduate</option><option>Graduate</option><option>Postgraduate</option></select></div>
        <div className="form-group"><label>GPA (0-4.0)</label><input type="number" step="0.1" min="0" max="4" value={f.gpa} onChange={e=>setF({...f,gpa:e.target.value})}/></div>
      </div><div className="grid2">
        <div className="form-group"><label>Major</label><input value={f.major} onChange={e=>setF({...f,major:e.target.value})} required/></div>
        <div className="form-group"><label>University</label><input value={f.school} onChange={e=>setF({...f,school:e.target.value})} required/></div>
      </div><div className="grid2">
        <div className="form-group"><label>Country</label><input value={f.nationality} onChange={e=>setF({...f,nationality:e.target.value})}/></div>
        <div className="form-group" style={{display:'flex',alignItems:'center',gap:8,paddingTop:22}}><input type="checkbox" id="fn" checked={f.financial_need} onChange={e=>setF({...f,financial_need:e.target.checked})} style={{width:18,height:18,cursor:'pointer'}}/><label htmlFor="fn" style={{marginBottom:0,cursor:'pointer'}}>Financial need</label></div>
      </div></>)}
      {err&&<p className="error" style={{marginBottom:8}}>{err}</p>}
      <button className="btn btn-primary" style={{width:'100%'}} disabled={loading}>{loading?<><span className="spinner"></span> {isLogin?'Signing in...':'Creating...'}</>:isLogin?'Sign in':'Create account'}</button>
    </form>
    <p style={{marginTop:'1rem',textAlign:'center',fontSize:13,color:'var(--text2)'}}>
      {isLogin?<>No account? <span style={{color:'var(--blue)',cursor:'pointer',fontWeight:500}} onClick={()=>go('register')}>Create one free</span></>:<>Have account? <span style={{color:'var(--blue)',cursor:'pointer',fontWeight:500}} onClick={()=>go('login')}>Sign in</span></>}
    </p>
  </div></div>);
}
function DashboardPage({user,go}){
  const[data,setData]=useState(null);const[readiness,setReadiness]=useState(null);
  useEffect(()=>{Promise.all([api('GET','/dashboard'),api('GET','/readiness')]).then(([d,r])=>{setData(d);setReadiness(r);}).catch(()=>{});;},[]);
  if(!data)return<div className="page"><div className="empty"><div className="spinner spinner-dark" style={{width:32,height:32,margin:'0 auto'}}></div></div></div>;
  return(<div className="page mb-safe">
    <h2 className="section-title">Hi, {user.name.split(' ')[0]} 👋</h2>
    <p className="section-sub">Your scholarship overview</p>
    <div className="grid4" style={{marginBottom:'1.25rem'}}>
      {[{l:'Matched',v:data.scholarships_matched,s:'scholarships',c:'var(--blue)'},
        {l:'Potential',v:'$'+Math.round(data.total_potential_usd/1000)+'k',s:'funding',c:'var(--green)'},
        {l:'Submitted',v:data.applications_submitted,s:'applications',c:'var(--navy)'},
        {l:'Won',v:'$'+data.total_won_usd.toLocaleString(),s:'in awards',c:'var(--purple)'}].map(s=>(
        <div key={s.l} className="card-flat"><div style={{fontSize:12,color:'var(--text3)',marginBottom:3}}>{s.l}</div>

            {rubric.dimensions.map(dim=>{const s=result.rubric_scores?.[dim.key]||result.overall_score;return(
              <div key={dim.key} style={{marginBottom:8}}><div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:3}}>
                <span>{dim.label} <span style={{color:'var(--text3)',fontSize:11}}>({dim.weight}%)</span></span><span style={{fontWeight:600}}>{(s*100).toFixed(0)}%</span></div>
                <div className="progress progress-sm"><div className="progress-fill" style={{width:`${s*100}%`,background:s>=.75?'var(--green)':s>=.5?'var(--blue)':'var(--yellow)'}}></div></div>
              </div>);})}
          </div>
          <div style={{background:'var(--bg3)',borderRadius:8,padding:'10px 12px',fontSize:14}}>💡 {result.feedback}</div>
          {result.filler_count>0&&<div style={{fontSize:13,color:'var(--yellow)',marginTop:8}}>⚠ {result.filler_count} filler word(s) detected</div>}
        </div>}
      </>}
    </>}
  </div>);
}
function ProfilePage({user,setUser}){
  const[f,setF]=useState({...user});const[saving,setSaving]=useState(false);const[uploading,setUploading]=useState(false);const[readiness,setReadiness]=useState(null);
  const fileRef=useRef();
  useEffect(()=>{api('GET','/readiness').then(setReadiness).catch(()=>{});},[]);
  const save=async(e)=>{e.preventDefault();setSaving(true);try{
    const upd=await api('PATCH','/profile',{name:f.name,major:f.major,school:f.school,gpa:parseFloat(f.gpa)||0,nationality:f.nationality,financial_need:f.financial_need,personal_statement:f.personal_statement,
      skills:typeof f.skills==='string'?f.skills.split(',').map(s=>s.trim()).filter(Boolean):f.skills,
      extracurriculars:typeof f.extracurriculars==='string'?f.extracurriculars.split(',').map(s=>s.trim()).filter(Boolean):f.extracurriculars});
    setUser({...user,...upd});const r=await api('GET','/readiness');setReadiness(r);toast('Profile saved','success');
  }catch(e){toast(e.message,'error');}finally{setSaving(false);};};
  const upload=async(e)=>{const file=e.target.files[0];if(!file)return;setUploading(true);
    try{const fd=new FormData();fd.append('file',file);const r=await api('POST','/profile/upload-doc',fd,true);
      if(r.extracted){setF(f=>({...f,...r.extracted}));toast(`Updated from ${file.name}`,'success');}else toast('Uploaded','success');
    }catch(e){toast(e.message,'error');}finally{setUploading(false);};};
  return(<div className="page mb-safe" style={{maxWidth:760}}>
    <h2 className="section-title">Your Profile</h2>
    {readiness&&<div className="card" style={{marginBottom:'1.25rem',display:'flex',gap:'1.5rem',alignItems:'flex-start',flexWrap:'wrap'}}>
      <ReadinessRing score={readiness.overall}/>
      <div style={{flex:1}}><div style={{fontWeight:600,fontSize:15,marginBottom:6}}>Readiness: {readiness.level}</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {Object.entries(readiness.scores).map(([k,v])=><div key={k} style={{minWidth:140,flex:1}}>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:2}}>{k.replace(/_/g,' ')}</div>
            <div className="progress progress-sm"><div className="progress-fill" style={{width:`${v}%`,background:v>=70?'var(--green)':v>=50?'var(--blue)':'var(--yellow)'}}></div></div>
          </div>)}</div>
        {readiness.tips?.[0]&&<p style={{fontSize:13,color:'var(--text2)',marginTop:8}}>💡 {readiness.tips[0]}</p>}
      </div></div>}
    <div className="card" style={{marginBottom:'1rem',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,background:'#eff6ff',border:'1px solid #bfdbfe'}}>
      <div><div style={{fontWeight:500}}>Upload CV or transcript</div><div style={{fontSize:13,color:'var(--text2)'}}>Auto-extract GPA, major, skills</div></div>
      <div><input ref={fileRef} type="file" accept=".pdf,.docx,.doc" style={{display:'none'}} onChange={upload}/>
        <button className="btn btn-primary btn-sm" disabled={uploading} onClick={()=>fileRef.current.click()}>{uploading?<><span className="spinner"></span> Uploading...</>:'📄 Upload'}</button></div>
    </div>
    <form onSubmit={save}>
      <div className="card" style={{marginBottom:'1rem'}}>
        <div style={{fontWeight:600,marginBottom:'1rem'}}>Personal details</div>
        <div className="grid2">
          <div className="form-group"><label>Full name</label><input value={f.name||''} onChange={e=>setF({...f,name:e.target.value})}/></div>
          <div className="form-group"><label>Email</label><input value={f.email||''} disabled style={{background:'var(--bg3)',color:'var(--text3)'}}/></div>
        </div>
        <div className="grid2">
          <div className="form-group"><label>Country</label><input value={f.nationality||''} onChange={e=>setF({...f,nationality:e.target.value})}/></div>
          <div className="form-group" style={{display:'flex',alignItems:'center',gap:8,paddingTop:22}}><input type="checkbox" id="fn2" checked={f.financial_need||false} onChange={e=>setF({...f,financial_need:e.target.checked})} style={{width:18,height:18,cursor:'pointer'}}/><label htmlFor="fn2" style={{marginBottom:0,cursor:'pointer'}}>Financial need</label></div>
        </div>
      </div>
      <div className="card" style={{marginBottom:'1rem'}}>
        <div style={{fontWeight:600,marginBottom:'1rem'}}>Academic background</div>
        <div className="grid2">
          <div className="form-group"><label>Degree level</label><select value={f.degree_level||'Graduate'} onChange={e=>setF({...f,degree_level:e.target.value})}><option>Undergraduate</option><option>Graduate</option><option>Postgraduate</option></select></div>
          <div className="form-group"><label>GPA (0-4.0)</label><input type="number" step="0.1" min="0" max="4" value={f.gpa||''} onChange={e=>setF({...f,gpa:e.target.value})}/></div>
        </div>
        <div className="grid2">
          <div className="form-group"><label>Major / Field</label><input value={f.major||''} onChange={e=>setF({...f,major:e.target.value})}/></div>
          <div className="form-group"><label>University</label><input value={f.school||''} onChange={e=>setF({...f,school:e.target.value})}/></div>
        </div>
      </div>
      <div className="card" style={{marginBottom:'1rem'}}>
        <div style={{fontWeight:600,marginBottom:'1rem'}}>Skills and activities</div>
        <div className="form-group"><label>Skills (comma-separated)</label><input value={Array.isArray(f.skills)?f.skills.join(', '):(f.skills||'')} onChange={e=>setF({...f,skills:e.target.value})} placeholder="Python, Cloud Computing, Leadership..."/><p className="helper">More skills = better scholarship matching</p></div>
        <div className="form-group"><label>Extracurricular activities</label><input value={Array.isArray(f.extracurriculars)?f.extracurriculars.join(', '):(f.extracurriculars||'')} onChange={e=>setF({...f,extracurriculars:e.target.value})} placeholder="Tech club president, Community teaching..."/></div>
        <div className="form-group"><label>Personal statement <span style={{fontWeight:400,color:'var(--text3)'}}>(used in essays)</span></label>
          <textarea rows={4} value={f.personal_statement||''} onChange={e=>setF({...f,personal_statement:e.target.value})} placeholder="Your goals, background, and what drives you..."/>
          <p className="helper">{(f.personal_statement||'').length}/500 chars — more detail = better essays</p></div>
      </div>
      <button className="btn btn-primary" type="submit" disabled={saving}>{saving?<><span className="spinner"></span> Saving...</>:'Save profile'}</button>
    </form>
  </div>);
}
function App(){
  const{user,loading,login,register,logout,setUser}=useAuth();
  const[page,setPage]=useState('home');const toasts=useToasts();
  const go=useCallback(p=>{setPage(p);window.scrollTo({top:0,behavior:'smooth'});},[]);
  useEffect(()=>{if(user&&page==='home')go('dashboard');if(!user&&['dashboard','pipeline','packages','profile'].includes(page))go('home');},[user,page]);
  if(loading)return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:'1rem'}}>
    <div className="spinner spinner-dark" style={{width:36,height:36}}></div><p style={{color:'var(--text3)',fontSize:14}}>Loading ScholarBot...</p></div>);
  const pages={home:<HomePage go={go}/>,login:<AuthPage mode="login" login={login} register={register} go={go}/>,
    register:<AuthPage mode="register" login={login} register={register} go={go}/>,
    dashboard:user&&<DashboardPage user={user} go={go}/>,scholarships:<ScholarshipsPage user={user} go={go}/>,
    pipeline:user&&<PipelinePage user={user}/>,packages:user&&<PackagesPage user={user}/>,
    interview:<InterviewPage user={user}/>,profile:user&&<ProfilePage user={user} setUser={setUser}/>};
  return(<><Nav user={user} page={page} go={go} logout={logout}/>
    <div>{pages[page]||pages['home']}</div>
    <div className="toast-wrap">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</div>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
