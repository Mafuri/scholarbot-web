<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ScholarBot — AI Scholarship Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f9f9f7;color:#1a1a1a;line-height:1.6}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:opacity .15s;text-decoration:none;white-space:nowrap}
.btn:hover{opacity:.85}.btn:active{transform:scale(.97)}
.btn-primary{background:#1a1a2e;color:#fff}
.btn-outline{background:transparent;border:1.5px solid #d0d0c8;color:#1a1a1a}
.btn-green{background:#059669;color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-xs{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:#fff;border:.5px solid #e8e8e0;border-radius:12px;padding:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.tag-blue{background:#dbeafe;color:#1d4ed8}
.tag-green{background:#d1fae5;color:#15803d}
.tag-yellow{background:#fef3c7;color:#92400e}
.tag-red{background:#fee2e2;color:#991b1b}
.form-group{margin-bottom:1rem}
label{font-size:13px;font-weight:500;color:#555;display:block;margin-bottom:5px}
input,select,textarea{width:100%;padding:10px 13px;border:1.5px solid #e8e8e0;border-radius:10px;font-size:14px;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:#6366f1}
.error{color:#dc2626;font-size:13px;margin-top:4px}
.nav{background:#1a1a2e;color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100}
.nav-brand{font-size:18px;font-weight:700;cursor:pointer}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-link{padding:6px 13px;border-radius:8px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.75);transition:all .15s}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.15);color:#fff}
.page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.page-narrow{max-width:680px;margin:0 auto;padding:1.5rem 1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.section-title{font-size:20px;font-weight:700;margin-bottom:.5rem}
.section-sub{color:#555;font-size:14px;margin-bottom:1.5rem}
.tab-bar{display:flex;border-bottom:1.5px solid #e8e8e0;margin-bottom:1.25rem;overflow-x:auto}
.tab{padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:#555;border-bottom:2px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:all .15s}
.tab.active{color:#1a1a2e;border-bottom-color:#1a1a2e}
.progress{background:#e5e7eb;border-radius:10px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;transition:width .5s}
.kanban{display:flex;gap:.75rem;overflow-x:auto;padding-bottom:.75rem}
.kanban-col{flex:0 0 210px;background:#f5f5f0;border-radius:12px;padding:.75rem;min-height:180px}
.kanban-col-title{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center}
.kanban-card{background:#fff;border:.5px solid #e8e8e0;border-radius:8px;padding:.75rem;margin-bottom:.5rem;font-size:13px}
.sch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.875rem}
.sch-card{border:.5px solid #e8e8e0;border-radius:12px;background:#fff;padding:1rem;cursor:pointer;transition:all .15s}
.sch-card:hover,.sch-card.selected{border-color:#6366f1;box-shadow:0 4px 16px rgba(99,102,241,.15)}
.hero{text-align:center;padding:4rem 1rem 3rem;max-width:780px;margin:0 auto}
.hero h1{font-size:clamp(28px,5vw,44px);font-weight:800;line-height:1.15;margin-bottom:1rem}
.hero p{font-size:clamp(15px,2vw,18px);color:#555;margin-bottom:2rem}
.stat-row{display:flex;justify-content:center;gap:2.5rem;padding:1.75rem;background:#fff;border-top:1px solid #e8e8e0;border-bottom:1px solid #e8e8e0;flex-wrap:wrap}
.empty{text-align:center;padding:3rem 1rem;color:#888}
.spinner{width:20px;height:20px;border:2px solid rgba(0,0,0,.12);border-top-color:#1a1a2e;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-wrap{position:fixed;bottom:1rem;right:1rem;display:flex;flex-direction:column;gap:.5rem;z-index:999}
.toast{background:#1a1a2e;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;animation:slideIn .25s ease}
.toast.success{background:#15803d}
.toast.error{background:#dc2626}
@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e0;padding:.5rem;z-index:100}
.mobile-nav-items{display:flex;justify-content:space-around}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px;color:#888;font-size:10px;font-weight:500}
.mobile-nav-item.active{color:#1a1a2e}
.mobile-nav-item .icon{font-size:20px}
.pb-mobile{padding-bottom:0}
@media(max-width:640px){
  .nav-links .nav-link{display:none}
  .mobile-nav{display:flex}
  .pb-mobile{padding-bottom:72px}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .sch-grid{grid-template-columns:1fr}
  .kanban-col{flex:0 0 190px}
}
.readiness-wrap{position:relative;width:100px;height:100px;flex-shrink:0}
.readiness-wrap svg{transform:rotate(-90deg)}
.readiness-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:22px;line-height:1}
.readiness-label{font-size:11px;color:#888;margin-top:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

const BASE = window.location.origin;
let _tok = localStorage.getItem('sb_tok') || '';

async function api(method, path, body, isForm) {
  const headers = {'Authorization': 'Bearer ' + _tok};
  if (!isForm) headers['Content-Type'] = 'application/json';
  const r = await fetch(BASE + '/api' + path, {
    method,
    headers,
    body: body ? (isForm ? body : JSON.stringify(body)) : undefined
  });
  if (r.status === 401) {
    _tok = '';
    localStorage.removeItem('sb_tok');
    window.location.reload();
  }
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || 'Request failed');
  return data;
}

let _addToast = () => {};
function useToasts() {
  const [toasts, setToasts] = useState([]);
  _addToast = (msg, type) => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type: type || 'info'}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  };
  return toasts;
}
const toast = (m, t) => _addToast(m, t);

function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (_tok) {
      api('GET', '/auth/me')
        .then(u => { setUser(u); setLoading(false); })
        .catch(() => { _tok = ''; localStorage.removeItem('sb_tok'); setLoading(false); });
    } else {
      setLoading(false);
    }
  }, []);
  const login = async (email, pw) => {
    const r = await api('POST', '/auth/login', {email, password: pw});
    _tok = r.token;
    localStorage.setItem('sb_tok', r.token);
    setUser(r.user);
  };
  const register = async (data) => {
    const r = await api('POST', '/auth/register', data);
    _tok = r.token;
    localStorage.setItem('sb_tok', r.token);
    setUser(r.user);
  };
  const logout = () => {
    _tok = '';
    localStorage.removeItem('sb_tok');
    setUser(null);
  };
  return {user, loading, login, register, logout, setUser};
}

function ReadinessRing({score}) {
  const r = 38;
  const circ = 2 * Math.PI * r;
  const fill = circ - (score / 100) * circ;
  const color = score >= 80 ? '#059669' : score >= 60 ? '#2563eb' : score >= 40 ? '#d97706' : '#dc2626';
  return (
    <div className="readiness-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={r} fill="none" stroke="#e5e7eb" strokeWidth="9"/>
        <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="9"
          strokeDasharray={circ} strokeDashoffset={fill} strokeLinecap="round"
          style={{transition: 'stroke-dashoffset .8s ease'}}/>
      </svg>
      <div className="readiness-val" style={{color}}>
        <span>{score}</span>
        <span className="readiness-label">/ 100</span>
      </div>
    </div>
  );
}

function Nav({user, page, go, logout}) {
  const links = [
    {id:'dashboard',label:'Dashboard',icon:'📊'},
    {id:'scholarships',label:'Scholarships',icon:'🎓'},
    {id:'pipeline',label:'Pipeline',icon:'📋'},
    {id:'packages',label:'Packages',icon:'📦'},
    {id:'interview',label:'Interview',icon:'🎤'},
    {id:'profile',label:'Profile',icon:'👤'},
  ];
  return (
    <React.Fragment>
      <nav className="nav">
        <div className="nav-brand" onClick={() => go('home')}>🎓 ScholarBot</div>
        <div className="nav-links">
          {user ? (
            <React.Fragment>
              {links.map(l => (
                <div key={l.id} className={'nav-link' + (page === l.id ? ' active' : '')} onClick={() => go(l.id)}>
                  {l.label}
                </div>
              ))}
              <div className="nav-link" style={{color:'rgba(255,255,255,.5)'}} onClick={logout}>Sign out</div>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <div className="nav-link" onClick={() => go('login')}>Log in</div>
              <button className="btn btn-primary btn-sm" style={{marginLeft:8}} onClick={() => go('register')}>
                Get started free
              </button>
            </React.Fragment>
          )}
        </div>
      </nav>
      {user && (
        <div className="mobile-nav">
          <div className="mobile-nav-items">
            {links.slice(0,5).map(l => (
              <div key={l.id} className={'mobile-nav-item' + (page === l.id ? ' active' : '')} onClick={() => go(l.id)}>
                <span className="icon">{l.icon}</span>
                <span>{l.label}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

function HomePage({go}) {
  return (
    <div>
      <div className="hero">
        <h1>Win scholarships with AI</h1>
        <p>Find, match, and apply to scholarships worldwide — Undergraduate, Graduate, and Postgraduate. ScholarBot builds your complete application. You click Submit.</p>
        <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn btn-primary" style={{fontSize:15,padding:'11px 24px'}} onClick={() => go('register')}>
            Start free →
          </button>
          <button className="btn btn-outline" style={{fontSize:15,padding:'11px 24px'}} onClick={() => go('scholarships')}>
            Browse scholarships
          </button>
        </div>
      </div>
      <div className="stat-row">
        {[['87+','Verified opportunities'],['$2.2M+','Total funding'],['3','Degree levels'],['8','Opportunity types']].map(([v,l]) => (
          <div key={l} style={{textAlign:'center'}}>
            <div style={{fontSize:26,fontWeight:800,color:'#1a1a2e'}}>{v}</div>
            <div style={{fontSize:12,color:'#888',marginTop:1}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{padding:'2.5rem 1rem',maxWidth:860,margin:'0 auto'}}>
        <h2 style={{textAlign:'center',fontSize:22,fontWeight:700,marginBottom:'2rem'}}>How it works</h2>
        <div className="grid3">
          {[
            ['1','Create your profile','Upload your CV. ScholarBot extracts your GPA, major, and skills automatically.'],
            ['2','Get matched','AI ranks scholarships for your specific degree level, country, and field.'],
            ['3','Prepare and submit','Essays written, briefing docs ready. Open the form, paste, click Submit.']
          ].map(([n,t,d]) => (
            <div key={n} className="card" style={{textAlign:'center'}}>
              <div style={{width:40,height:40,borderRadius:'50%',background:'#1a1a2e',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 1rem',fontWeight:700,fontSize:18}}>{n}</div>
              <h3 style={{fontSize:15,marginBottom:8}}>{t}</h3>
              <p style={{fontSize:13,color:'#555'}}>{d}</p>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:'#fff',borderTop:'1px solid #e8e8e0',padding:'2rem 1rem'}}>
        <h2 style={{textAlign:'center',fontSize:22,fontWeight:700,marginBottom:'2rem'}}>Pricing</h2>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(210px,1fr))',gap:'1rem',maxWidth:760,margin:'0 auto'}}>
          {[
            {name:'Free',price:0,features:['3 packages/month','Scholarship matching','Essay generation','Email alerts']},
            {name:'Pro',price:9,features:['Unlimited packages','Interview coach','Pipeline tracker','Portfolio builder','Priority support'],featured:true},
            {name:'Agency',price:99,features:['50 students','Admin dashboard','Bulk processing','White-label','API access']}
          ].map(pl => (
            <div key={pl.name} className="card" style={{textAlign:'center',position:'relative',border:pl.featured?'2px solid #1a1a2e':undefined}}>
              {pl.featured && <div style={{position:'absolute',top:-12,left:'50%',transform:'translateX(-50%)',background:'#1a1a2e',color:'#fff',padding:'3px 14px',borderRadius:20,fontSize:11}}>Popular</div>}
              <h3 style={{fontSize:17,fontWeight:700}}>{pl.name}</h3>
              <div style={{fontSize:32,fontWeight:800,color:'#1a1a2e',margin:'1rem 0'}}>
                {'$' + pl.price}<span style={{fontSize:14,color:'#888',fontWeight:400}}>/mo</span>
              </div>
              <ul style={{textAlign:'left',listStyle:'none',marginBottom:'1rem'}}>
                {pl.features.map(f => (
                  <li key={f} style={{fontSize:13,color:'#555',padding:'4px 0',display:'flex',gap:8}}>
                    <span style={{color:'#059669',fontWeight:700}}>✓</span>{f}
                  </li>
                ))}
              </ul>
              <button className={'btn ' + (pl.featured ? 'btn-primary' : 'btn-outline')} style={{width:'100%'}} onClick={() => go('register')}>
                {pl.price === 0 ? 'Start free' : 'Get started'}
              </button>
            </div>
          ))}
        </div>
      </div>
      <footer style={{background:'#1a1a2e',color:'rgba(255,255,255,.5)',textAlign:'center',padding:'2rem 1rem',fontSize:13}}>
        ScholarBot © {new Date().getFullYear()} · AI-powered scholarship applications · Built for students worldwide
      </footer>
    </div>
  );
}

function AuthPage({mode, login, register, go}) {
  const [form, setForm] = useState({name:'',email:'',password:'',degree_level:'Graduate',major:'',school:'',nationality:'Kenya',gpa:'',financial_need:false});
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const isLogin = mode === 'login';
  const set = (k, v) => setForm(f => ({...f, [k]: v}));
  const submit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setErr('');
    try {
      if (isLogin) {
        await login(form.email, form.password);
        go('dashboard');
        toast('Welcome back!', 'success');
      } else {
        await register({...form, gpa: parseFloat(form.gpa) || 0});
        go('dashboard');
        toast('Account created! Welcome.', 'success');
      }
    } catch(e) {
      setErr(e.message);
    } finally {
      setLoading(false);
    }
  };
  return (
    <div className="page-narrow">
      <div className="card" style={{marginTop:'2rem'}}>
        <h2 style={{marginBottom:'1.5rem',fontSize:22}}>{isLogin ? 'Sign in' : 'Create account'}</h2>
        <form onSubmit={submit}>
          {!isLogin && (
            <div className="form-group">
              <label>Full name</label>
              <input value={form.name} onChange={e => set('name', e.target.value)} required/>
            </div>
          )}
          <div className="form-group">
            <label>Email</label>
            <input type="email" value={form.email} onChange={e => set('email', e.target.value)} required/>
          </div>
          <div className="form-group">
            <label>Password</label>
            <input type="password" value={form.password} onChange={e => set('password', e.target.value)} required/>
          </div>
          {!isLogin && (
            <React.Fragment>
              <div className="grid2">
                <div className="form-group">
                  <label>Degree level</label>
                  <select value={form.degree_level} onChange={e => set('degree_level', e.target.value)}>
                    <option>Undergraduate</option>
                    <option>Graduate</option>
                    <option>Postgraduate</option>
                  </select>
                </div>
                <div className="form-group">
                  <label>GPA (0-4.0)</label>
                  <input type="number" step="0.1" min="0" max="4" value={form.gpa} onChange={e => set('gpa', e.target.value)}/>
                </div>
              </div>
              <div className="grid2">
                <div className="form-group">
                  <label>Major / Field</label>
                  <input value={form.major} onChange={e => set('major', e.target.value)} required/>
                </div>
                <div className="form-group">
                  <label>University</label>
                  <input value={form.school} onChange={e => set('school', e.target.value)} required/>
                </div>
              </div>
              <div className="grid2">
                <div className="form-group">
                  <label>Country</label>
                  <input value={form.nationality} onChange={e => set('nationality', e.target.value)}/>
                </div>
                <div className="form-group" style={{display:'flex',alignItems:'center',gap:8,paddingTop:22}}>
                  <input type="checkbox" id="fn" checked={form.financial_need} onChange={e => set('financial_need', e.target.checked)} style={{width:18,height:18,cursor:'pointer'}}/>
                  <label htmlFor="fn" style={{marginBottom:0,cursor:'pointer'}}>Financial need</label>
                </div>
              </div>
            </React.Fragment>
          )}
          {err && <p className="error" style={{marginBottom:8}}>{err}</p>}
          <button className="btn btn-primary" style={{width:'100%'}} disabled={loading}>
            {loading ? 'Loading...' : (isLogin ? 'Sign in' : 'Create account')}
          </button>
        </form>
        <p style={{marginTop:'1rem',textAlign:'center',fontSize:13,color:'#555'}}>
          {isLogin ? (
            <span>No account? <span style={{color:'#2563eb',cursor:'pointer',fontWeight:500}} onClick={() => go('register')}>Create one free</span></span>
          ) : (
            <span>Have account? <span style={{color:'#2563eb',cursor:'pointer',fontWeight:500}} onClick={() => go('login')}>Sign in</span></span>
          )}
        </p>
      </div>
    </div>
  );
}

function DashboardPage({user, go}) {
  const [data, setData] = useState(null);
  const [readiness, setReadiness] = useState(null);
  useEffect(() => {
    Promise.all([api('GET', '/dashboard'), api('GET', '/readiness')])
      .then(([d, r]) => { setData(d); setReadiness(r); })
      .catch(() => {});
  }, []);
  if (!data) return (
    <div className="page">
      <div className="empty"><div className="spinner"></div></div>
    </div>
  );
  const fname = user.name ? user.name.split(' ')[0] : 'there';
  return (
    <div className="page pb-mobile">
      <h2 className="section-title">Hi, {fname} 👋</h2>
      <p className="section-sub">Your scholarship overview</p>
      <div className="grid4" style={{marginBottom:'1.25rem'}}>
        {[
          {label:'Matched',value:data.scholarships_matched,sub:'scholarships',color:'#2563eb'},
          {label:'Potential',value:'$' + Math.round((data.total_potential_usd||0)/1000) + 'k',sub:'in funding',color:'#059669'},
          {label:'Submitted',value:data.applications_submitted,sub:'applications',color:'#1a1a2e'},
          {label:'Won',value:'$' + (data.total_won_usd||0).toLocaleString(),sub:'in awards',color:'#7c3aed'}
        ].map(s => (
          <div key={s.label} className="card" style={{borderRadius:10,padding:'1rem'}}>
            <div style={{fontSize:12,color:'#888',marginBottom:3}}>{s.label}</div>
            <div style={{fontSize:24,fontWeight:700,color:s.color}}>{s.value}</div>
            <div style={{fontSize:11,color:'#888'}}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div className="grid2" style={{marginBottom:'1.25rem'}}>
        {readiness && (
          <div className="card">
            <div style={{fontWeight:600,marginBottom:'1rem',fontSize:15}}>Scholarship Readiness</div>
            <div style={{display:'flex',gap:'1.5rem',alignItems:'flex-start'}}>
              <ReadinessRing score={readiness.overall}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,marginBottom:6}}>{readiness.level}</div>
                {Object.entries(readiness.scores || {}).map(([k, v]) => (
                  <div key={k} style={{marginBottom:7}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#555',marginBottom:2}}>
                      <span>{k.replace(/_/g, ' ')}</span>
                      <span>{v}%</span>
                    </div>
                    <div className="progress">
                      <div className="progress-fill" style={{
                        width: v + '%',
                        background: v >= 70 ? '#059669' : v >= 50 ? '#2563eb' : '#d97706'
                      }}></div>
                    </div>
                  </div>
                ))}

function ScholarshipsPage({user, go}) {
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('all');
  const [field, setField] = useState('');
  const [region, setRegion] = useState('');
  const [selected, setSelected] = useState(null);
  const [adding, setAdding] = useState(null);
  const load = useCallback(async () => {
    setLoading(true);
    try {
      const ep = user ? '/scholarships/matched' : '/scholarships';
      const params = new URLSearchParams();
      if (tab !== 'all') params.set('degree_level', tab);
      if (field) params.set('field', field);
      if (region) params.set('region', region);
      const r = await api('GET', ep + '?' + params.toString());
      setList(r.scholarships || r.opportunities || []);
    } finally {
      setLoading(false);
    }
  }, [tab, field, region, user]);
  useEffect(() => { load(); }, [load]);
  const addToPipeline = async (s) => {
    if (!user) { go('register'); return; }
    setAdding(s.id);
    try {
      await api('POST', '/pipeline/add', {
        scholarship_id: s.id,
        scholarship_name: s.name,
        amount_usd: s.amount_usd,
        deadline: s.deadline,
        url: s.url,
        stage: 'researching'
      });
      toast('Added to pipeline', 'success');
    } catch(e) {
      toast(e.message, 'error');
    } finally {
      setAdding(null);
    }
  };
  const filtered = tab === 'all' ? list : list.filter(s => {
    const degs = s.degree_levels || [];
    return degs.some(d => d.toLowerCase().includes(tab.slice(0,4).toLowerCase()));
  });
  return (
    <div className="page pb-mobile">
      <h2 className="section-title">Scholarships</h2>
      <p className="section-sub">{user ? 'Matched for your profile' : 'All verified direct-portal scholarships'}</p>
      <div className="tab-bar">
        {['all','Undergraduate','Graduate','Postgraduate'].map(t => (
          <div key={t} className={'tab' + (tab===t?' active':'')} onClick={() => { setTab(t); setSelected(null); }}>
            {t === 'all' ? 'All' : t}
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:'1.25rem',flexWrap:'wrap'}}>
        <select value={field} onChange={e => setField(e.target.value)} style={{flex:1,minWidth:130}}>
          <option value="">All fields</option>
          {['Computer Science','Information Technology','Cybersecurity','AI/ML','Data Science','Software Engineering'].map(f => (
            <option key={f}>{f}</option>
          ))}
        </select>
        <select value={region} onChange={e => setRegion(e.target.value)} style={{flex:1,minWidth:120}}>
          <option value="">All regions</option>
          {['Africa','Kenya','Global','UK','USA','Europe','Asia','Canada'].map(r => (
            <option key={r}>{r}</option>
          ))}
        </select>
        <button className="btn btn-outline btn-sm" onClick={load}>↺</button>
      </div>
      {loading ? (
        <div className="empty"><div className="spinner"></div></div>
      ) : filtered.length === 0 ? (
        <div className="empty">
          <div style={{fontSize:40,marginBottom:'.75rem'}}>🔍</div>
          <p>No scholarships found</p>
        </div>
      ) : (
        <React.Fragment>
          <p style={{fontSize:13,color:'#888',marginBottom:'1rem'}}>{filtered.length} scholarships found</p>
          <div className="sch-grid">
            {filtered.map(s => (
              <div key={s.id} className={'sch-card' + (selected && selected.id===s.id?' selected':'')} onClick={() => setSelected(selected && selected.id===s.id ? null : s)}>
                <div style={{fontWeight:600,fontSize:14,lineHeight:1.3,marginBottom:2}}>{s.name}</div>
                <div style={{fontSize:22,fontWeight:700,color:'#1a1a2e',margin:'4px 0'}}>{'$' + (s.amount_usd||0).toLocaleString()}</div>
                <div style={{fontSize:12,color:'#888'}}>{s.provider}</div>
                <div style={{fontSize:12,color:'#888',marginTop:4}}>
                  {s.deadline}
                  {s.days_left !== undefined && (
                    <span className={'tag ' + (s.days_left<=30?'tag-red':'tag-green')} style={{marginLeft:6,fontSize:10}}>
                      {s.days_left}d
                    </span>
                  )}
                </div>
                {user && s.match_score !== undefined && (
                  <div style={{marginTop:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#888',marginBottom:3}}>
                      <span>Match</span>
                      <span>{Math.round(s.match_score*100)}%</span>
                    </div>
                    <div className="progress">
                      <div className="progress-fill" style={{width:(s.match_score*100)+'%',background:'#1a1a2e'}}></div>
                    </div>
                  </div>
                )}
                {selected && selected.id === s.id && (
                  <div style={{marginTop:'1rem',paddingTop:'1rem',borderTop:'1px solid #e8e8e0'}} onClick={e => e.stopPropagation()}>
                    <p style={{fontSize:13,color:'#555',marginBottom:'.75rem',fontStyle:'italic'}}>{(s.essay_prompt||'').slice(0,120)}...</p>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      <button className="btn btn-primary btn-sm" disabled={adding===s.id} onClick={() => addToPipeline(s)}>

                      <a href={s.url} target="_blank" rel="noreferrer" className="btn btn-outline btn-sm" onClick={e => e.stopPropagation()}>
                        Apply →
                      </a>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

function InterviewPage() {
  const [scholarship, setScholarship] = useState('general');
  const [questions, setQuestions] = useState([]);
  const [currentQ, setCurrentQ] = useState(0);
  const [answer, setAnswer] = useState('');
  const [result, setResult] = useState(null);
  const [scoring, setScoring] = useState(false);
  const [history, setHistory] = useState([]);
  const rubric = RUBRICS[scholarship] || RUBRICS.general;
  useEffect(() => {
    api('GET', '/interview/questions/' + scholarship)
      .then(r => { setQuestions(r.questions || []); setCurrentQ(0); setAnswer(''); setResult(null); })
      .catch(() => {});
  }, [scholarship]);
  const submit = async () => {
    if (!answer.trim() || answer.split(/\s+/).length < 20) {
      toast('Please write a fuller answer (at least 20 words)', 'error');
      return;
    }
    setScoring(true);
    try {
      const q = questions[currentQ];
      const r = await api('POST', '/interview/score', {question: q.q, answer, scholarship});
      setResult(r);
      setHistory(h => [...h, {question: q.q, score: r.overall_score, feedback: r.feedback}]);
    } catch(e) {
      toast(e.message, 'error');
    } finally {
      setScoring(false);
    }
  };
  const next = () => {
    if (currentQ < questions.length - 1) {
      setCurrentQ(q => q + 1);
      setAnswer('');
      setResult(null);
    }
  };
  const wc = answer.split(/\s+/).filter(Boolean).length;
  const avgScore = history.length ? Math.round(history.reduce((a, h) => a + h.score, 0) / history.length * 100) : 0;
  return (
    <div className="page pb-mobile" style={{maxWidth:800}}>
      <h2 className="section-title">Interview Coach</h2>
      <p className="section-sub">Practice with official scholarship scoring rubrics</p>
      <div style={{display:'flex',gap:10,marginBottom:'1.25rem',flexWrap:'wrap',alignItems:'flex-end'}}>
        <div className="form-group" style={{flex:1,minWidth:180,marginBottom:0}}>
          <label>Scholarship type</label>
          <select value={scholarship} onChange={e => setScholarship(e.target.value)}>
            {[['general','General'],['chevening','Chevening'],['fulbright','Fulbright'],['gates_cambridge','Gates Cambridge']].map(([v,l]) => (
              <option key={v} value={v}>{l}</option>
            ))}
          </select>
        </div>
        {history.length > 0 && (
          <div className="card" style={{padding:'8px 14px'}}>
            <span style={{fontSize:13,color:'#555'}}>Session avg: <strong>{avgScore}%</strong></span>
            <span style={{fontSize:12,color:'#888',marginLeft:8}}>{history.length}/{questions.length}</span>
          </div>
        )}
      </div>
      {questions.length > 0 && (
        <React.Fragment>
          <div style={{background:'#f5f5f0',borderRadius:12,padding:'1.25rem',borderLeft:'4px solid #1a1a2e',marginBottom:'1rem'}}>
            <div style={{fontSize:11,color:'#888',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}}>
              Q{currentQ+1}/{questions.length}
            </div>
            <div style={{fontSize:17,fontWeight:600,marginBottom:10,lineHeight:1.4}}>{questions[currentQ] && questions[currentQ].q}</div>
            <div style={{fontSize:13,color:'#555',background:'rgba(99,102,241,.07)',padding:'8px 12px',borderRadius:6}}>
              💡 {questions[currentQ] && questions[currentQ].tips}
            </div>
          </div>
          <div className="form-group">
            <label>Your answer ({wc} words — aim for 150-250)</label>
            <textarea rows={7} value={answer} onChange={e => setAnswer(e.target.value)}
              placeholder="Type your answer here. Be specific — use numbers, names, and concrete examples."/>
          </div>
          <div style={{display:'flex',gap:10,marginBottom:'1.5rem',flexWrap:'wrap'}}>
            <button className="btn btn-primary" disabled={scoring || !answer.trim()} onClick={submit}>
              {scoring ? 'Scoring...' : 'Score my answer'}
            </button>
            {result && currentQ < questions.length - 1 && (
              <button className="btn btn-outline" onClick={next}>Next question →</button>
            )}
          </div>
          {result && (
            <div className="card" style={{borderColor: result.overall_score>=.75?'#059669':result.overall_score>=.5?'#d97706':'#dc2626',borderWidth:1.5}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
                <span style={{fontWeight:700,fontSize:18}}>Score: {Math.round(result.overall_score*100)}%</span>
                <span style={{fontSize:26,fontWeight:800,color:result.grade==='A'?'#059669':result.grade==='B'?'#2563eb':result.grade==='C'?'#d97706':'#dc2626'}}>
                  {result.grade}
                </span>
              </div>
              <div style={{marginBottom:'1rem'}}>
                <div style={{fontSize:12,fontWeight:600,color:'#555',marginBottom:8}}>{rubric.name}</div>
                {rubric.dimensions.map(dim => {
                  const s = result.overall_score;
                  return (
                    <div key={dim.key} style={{marginBottom:8}}>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:3}}>
                        <span>{dim.label} <span style={{color:'#888',fontSize:11}}>({dim.weight}%)</span></span>
                        <span style={{fontWeight:600}}>{Math.round(s*100)}%</span>
                      </div>
                      <div className="progress">
                        <div className="progress-fill" style={{
                          width: (s*100) + '%',
                          background: s>=.75?'#059669':s>=.5?'#2563eb':'#d97706'
                        }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{background:'#f5f5f0',borderRadius:8,padding:'10px 12px',fontSize:14}}>
                💡 {result.feedback}
              </div>
            </div>
          )}
        </React.Fragment>
      )}
    </div>
  );
}

                  }}></div>
                </div>
              </div>
            ))}
            {readiness.tips && readiness.tips[0] && (
              <p style={{fontSize:13,color:'#555',marginTop:8}}>💡 {readiness.tips[0]}</p>
            )}
          </div>
        </div>
      )}
      <form onSubmit={save}>
        <div className="card" style={{marginBottom:'1rem'}}>
          <div style={{fontWeight:600,marginBottom:'1rem'}}>Personal details</div>
          <div className="grid2">
            <div className="form-group"><label>Full name</label><input value={form.name||''} onChange={e => set('name', e.target.value)}/></div>
            <div className="form-group"><label>Email</label><input value={form.email||''} disabled style={{background:'#f5f5f0',color:'#888'}}/></div>
          </div>
          <div className="grid2">
            <div className="form-group"><label>Country</label><input value={form.nationality||''} onChange={e => set('nationality', e.target.value)}/></div>
            <div className="form-group" style={{display:'flex',alignItems:'center',gap:8,paddingTop:22}}>
              <input type="checkbox" id="fn2" checked={form.financial_need||false} onChange={e => set('financial_need', e.target.checked)} style={{width:18,height:18,cursor:'pointer'}}/>
              <label htmlFor="fn2" style={{marginBottom:0,cursor:'pointer'}}>Financial need</label>
            </div>
          </div>
        </div>
        <div className="card" style={{marginBottom:'1rem'}}>
          <div style={{fontWeight:600,marginBottom:'1rem'}}>Academic background</div>
          <div className="grid2">
            <div className="form-group">
              <label>Degree level</label>
              <select value={form.degree_level||'Graduate'} onChange={e => set('degree_level', e.target.value)}>
                <option>Undergraduate</option><option>Graduate</option><option>Postgraduate</option>
              </select>
            </div>
            <div className="form-group"><label>GPA (0-4.0)</label><input type="number" step="0.1" min="0" max="4" value={form.gpa||''} onChange={e => set('gpa', e.target.value)}/></div>
          </div>
          <div className="grid2">
            <div className="form-group"><label>Major / Field</label><input value={form.major||''} onChange={e => set('major', e.target.value)}/></div>
            <div className="form-group"><label>University</label><input value={form.school||''} onChange={e => set('school', e.target.value)}/></div>
          </div>
        </div>
        <div className="card" style={{marginBottom:'1rem'}}>
          <div style={{fontWeight:600,marginBottom:'1rem'}}>Skills and activities</div>
          <div className="form-group">
            <label>Skills (comma-separated)</label>
            <input value={Array.isArray(form.skills)?form.skills.join(', '):(form.skills||'')} onChange={e => set('skills', e.target.value)} placeholder="Python, Cloud Computing, Leadership..."/>
          </div>
          <div className="form-group">
            <label>Extracurricular activities</label>
            <input value={Array.isArray(form.extracurriculars)?form.extracurriculars.join(', '):(form.extracurriculars||'')} onChange={e => set('extracurriculars', e.target.value)} placeholder="Tech club president, Community teaching..."/>
          </div>
          <div className="form-group">
            <label>Personal statement</label>
            <textarea rows={4} value={form.personal_statement||''} onChange={e => set('personal_statement', e.target.value)} placeholder="Your goals, background, and what drives you..."/>
          </div>
        </div>
        <button className="btn btn-primary" type="submit" disabled={saving}>
          {saving ? 'Saving...' : 'Save profile'}
        </button>
      </form>
    </div>
  );
}

function App() {
  const {user, loading, login, register, logout, setUser} = useAuth();
  const [page, setPage] = useState('home');
  const toasts = useToasts();
  const go = useCallback((p) => {
    setPage(p);
    window.scrollTo({top:0, behavior:'smooth'});
  }, []);
  useEffect(() => {
    if (user && page === 'home') go('dashboard');
    if (!user && ['dashboard','pipeline','packages','profile'].includes(page)) go('home');
  }, [user, page]);
  if (loading) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:'1rem'}}>
        <div className="spinner" style={{width:36,height:36}}></div>
        <p style={{color:'#888',fontSize:14}}>Loading ScholarBot...</p>
      </div>
    );
  }
  const pages = {
    home: <HomePage go={go}/>,
    login: <AuthPage mode="login" login={login} register={register} go={go}/>,
    register: <AuthPage mode="register" login={login} register={register} go={go}/>,
    dashboard: user && <DashboardPage user={user} go={go}/>,
    scholarships: <ScholarshipsPage user={user} go={go}/>,
    pipeline: user && <PipelinePage/>,
    packages: user && <PackagesPage user={user}/>,
    interview: <InterviewPage/>,
    profile: user && <ProfilePage user={user} setUser={setUser}/>,
  };
  return (
    <React.Fragment>
      <Nav user={user} page={page} go={go} logout={logout}/>
      <div>{pages[page] || pages['home']}</div>
      <div className="toast-wrap">
        {toasts.map(t => (
          <div key={t.id} className={'toast ' + t.type}>{t.msg}</div>
        ))}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
